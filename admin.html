<!DOCTYPE html>
<html>
<head>
  <title>Admin - WrittenAnchor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Admin Panel</h1>

  <input type="text" id="title" placeholder="Post Title"><br><br>
  <textarea id="content" placeholder="Write your content here..."></textarea><br><br>

  <button id="publishBtn">Publish</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 PASTE YOUR REAL FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyDaYvM-qIm87UNWXooDLejflRAOBK5B9jU",
  authDomain: "writtenanchor.firebaseapp.com",
  projectId: "writtenanchor",
  storageBucket: "writtenanchor.firebasestorage.app",
  messagingSenderId: "292669837484",
  appId: "1:292669837484:web:169fdfd77b20b19e150f09"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const publishBtn = document.getElementById("publishBtn");

publishBtn.addEventListener("click", async () => {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  if (!title || !content) {
    alert("Please fill both fields.");
    return;
  }

  try {
    await addDoc(collection(db, "posts"), {
      title: title,
      content: content,
      createdAt: serverTimestamp()
    });

    alert("Post published successfully!");
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

  } catch (error) {
    console.error("Error adding document: ", error);
    alert("Error publishing post.");
  }
});
</script>

</body>
</html>
